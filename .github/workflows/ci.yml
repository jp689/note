name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_ENABLE_MOCK_FALLBACK: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint:web

      - name: Build web
        run: npm run build:web

  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    env:
      API_DATABASE_URL: sqlite:///./.local/ci-api.db
      API_LOCAL_STORAGE_DIR: .local/storage
      API_AUTO_CREATE_TABLES: "true"
      API_SEED_DEMO: "true"
      API_PROCESS_INLINE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run API tests
        run: python -m pytest tests -q

  worker:
    name: Worker tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration/ai-pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run worker tests
        run: python -m pytest tests -q
