name: Deploy to Aliyun ECS

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  ECS_HOST: ${{ secrets.ECS_HOST }}
  ECS_USER: ${{ secrets.ECS_USER }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/api
          file: ./infrastructure/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ai-study-api:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ai-study-api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./integration/ai-pipeline
          file: ./infrastructure/docker/ai-pipeline.Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ai-study-worker:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ai-study-worker:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infrastructure/docker/web.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://ainote.cloud
            NEXT_PUBLIC_ENABLE_MOCK_FALLBACK=false
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ai-study-web:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ai-study-web:latest

      - name: Prepare ECS directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/ai-study-notes/infrastructure/caddy

      - name: Copy Compose and proxy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "docker-compose.prod.yml,infrastructure/caddy/Caddyfile"
          target: /opt/ai-study-notes

      - name: Pull images and restart ECS services
        uses: appleboy/ssh-action@v1.2.0
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ env.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ env.ACR_USERNAME }}
          ACR_PASSWORD: ${{ env.ACR_PASSWORD }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: ACR_REGISTRY,ACR_NAMESPACE,ACR_USERNAME,ACR_PASSWORD,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/ai-study-notes
            if [ ! -f .env ]; then
              echo "Missing /opt/ai-study-notes/.env"
              exit 1
            fi
            docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" -p "$ACR_PASSWORD"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d postgres redis minio
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml run --rm api python -m app.reprocess_outdated
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
